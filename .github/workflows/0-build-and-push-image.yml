# 0-build-and-push-image.yml
# Builds the Docker image from the fixed source (private repo) and pushes it
# to GHCR so the four demo workflows can pull it.
#
# Run this ONCE (or whenever the source code is updated) via workflow_dispatch.
#
# Required secret:  SRC_REPO_TOKEN — a PAT with `repo` + `write:packages` scope
#   Set it at: Settings → Secrets → Actions → New repository secret
name: "0 · Build & Push Docker Image"

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/poornimaramakrishnan/votum-ecourts:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. Check out the fixed source code from the private repo ──────────
      - name: Checkout fixed source
        uses: actions/checkout@v4
        with:
          repository: poornimaramakrishnan/votum-ecourts-src
          token: ${{ secrets.SRC_REPO_TOKEN }}

      # ── 2. Set up Docker Buildx for layer caching ─────────────────────────
      - uses: docker/setup-buildx-action@v3

      # ── 3. Log in to GHCR ─────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.SRC_REPO_TOKEN }}

      # ── 4. Build locally first so we can run the test gate ────────────────
      - name: Build image (local load)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 5. Gate: all 83 tests must pass before we push ────────────────────
      - name: Run test suite inside image
        run: |
          docker run --rm \
            --entrypoint python \
            "${{ env.IMAGE }}" \
            -m pytest /app/tests/ -q --tb=short
        shell: bash

      # ── 6. Push to GHCR only after tests pass ─────────────────────────────
      - name: Push image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
