name: "2 · Parse All Courts (7-court matrix)"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/poornimaramakrishnan/votum-ecourts:latest

jobs:
  parse-court:
    name: "Parse ${{ matrix.court }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        court:
          - SCI
          - NCLAT
          - NCLT
          - BombayHC
          - DelhiHC
          - DCServices
          - GujaratHC

    steps:
      - name: Pull image
        run: docker pull $IMAGE

      - name: Parse ${{ matrix.court }}
        run: |
          mkdir -p ${{ github.workspace }}/out
          docker run --rm \
            -v "${{ github.workspace }}/out:/out" \
            "$IMAGE" \
            python /app/demo/parse_court.py \
              --court "${{ matrix.court }}" \
              --out /out

      - name: Summarise
        if: always()
        run: |
          JSON="${{ github.workspace }}/out/${{ matrix.court }}_parsed.json"
          echo "## 📄 ${{ matrix.court }}" >> $GITHUB_STEP_SUMMARY
          if [ -f "$JSON" ]; then
            COUNT=$(python3 -c "import json; print(len(json.load(open('$JSON'))))")
            echo "✅ **$COUNT entries** extracted." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ No output produced." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📎 Download **${{ matrix.court }}-results** to inspect the JSON and input PDF." >> $GITHUB_STEP_SUMMARY

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.court }}-results"
          path: |
            ${{ github.workspace }}/out/${{ matrix.court }}_cause_list.pdf
            ${{ github.workspace }}/out/${{ matrix.court }}_parsed.json
          if-no-files-found: ignore
          retention-days: 30
